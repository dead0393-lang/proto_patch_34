name: Build libhook.so with protobuf 3.19.6

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-22.04

    container:
      image: debian:11  # сборка внутри Debian 11, как у тебя в сервере

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install base dependencies
      run: |
        apt-get update -qq
        apt-get install -y -qq \
          build-essential \
          git \
          cmake \
          wget \
          unzip \
          pkg-config \
          libssl-dev \
          zlib1g-dev \
          libcurl4-openssl-dev

    - name: Install protobuf 3.19.6 from source
      run: |
        wget https://github.com/protocolbuffers/protobuf/releases/download/v3.19.6/protobuf-all-3.19.6.tar.gz
        tar -xzf protobuf-all-3.19.6.tar.gz
        cd protobuf-3.19.6
        ./configure --prefix=/usr/local --disable-shared
        make -j$(nproc)
        make install
        ldconfig

    - name: Verify protobuf version
      run: |
        protoc --version
        strings /usr/local/lib/libprotobuf.a | grep -i '3.19.6' || echo "No version string found"

    - name: Build projecthook
      run: |
        make clean || true
        make

    - name: List built .so files (debug)
      run: |
        find . -name "*.so" -type f -exec ls -l {} \; || true

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: libhook-protobuf-3.19.6
        path: |
          **/*.so
        if-no-files-found: error
