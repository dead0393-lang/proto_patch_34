name: Build libhook.so for Debian 11 (Bullseye)

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-22.04  # хост-раннер любой, но внутри используем debian:11

    container:
      image: debian:11  # ← ключ: сборка внутри чистого Debian 11 контейнера

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install build dependencies inside Debian 11
      run: |
        apt-get update -qq
        apt-get install -y -qq \
          build-essential \
          git \
          cmake \
          libprotobuf-dev \
          protobuf-compiler \
          zlib1g-dev \
          libssl-dev \
          pkg-config \
          libcurl4-openssl-dev  # для httplib, если нужно

    - name: Build project
      run: |
        make clean || true
        make

    - name: List built files for debug
      run: |
        ls -la . || true
        find . -name "*.so" -type f -exec ls -l {} \; || true

    - name: Upload the .so artifact
      uses: actions/upload-artifact@v4
      with:
        name: libhook-debian11
        path: |
          **/*.so
        if-no-files-found: error
