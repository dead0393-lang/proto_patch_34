name: Build libhook.so with Debian 11 protobuf (3.12.4)

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-22.04

    container:
      image: debian:11

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies (protobuf from Debian 11 repos)
      run: |
        apt-get update -qq
        apt-get install -y -qq \
          build-essential \
          git \
          cmake \
          libprotobuf-dev \
          protobuf-compiler \
          libprotobuf-lite-dev \
          zlib1g-dev \
          libssl-dev \
          pkg-config \
          libcurl4-openssl-dev

    - name: Verify protobuf version
      run: |
        protoc --version
        dpkg -l | grep protobuf

    - name: Build projecthook
      run: |
        make clean || true
        make

    - name: List .so files
      run: find . -name "*.so" -exec ls -l {} \;

    - uses: actions/upload-artifact@v4
      with:
        name: libhook-proto-3.12
        path: '**/*.so'
