name: Build libhook.so for Debian 11 compatibility

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-22.04   # ← это работает, GCC 11 по умолчанию

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          git \
          cmake \
          libprotobuf-dev \
          protobuf-compiler \
          zlib1g-dev \
          libssl-dev \
          pkg-config \
          libcurl4-openssl-dev  # если httplib требует curl

    - name: Build project
      run: |
        make clean || true
        make

    - name: Find and list built .so files
      run: |
        find . -name "*.so" -type f -exec ls -l {} \;

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: libhook-so
        path: |
          **/*.so
        if-no-files-found: error
