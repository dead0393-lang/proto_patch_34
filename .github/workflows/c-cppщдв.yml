name: Build libhook.so with Debian 11 protobuf (3.12.4)

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-22.04

    container:
      image: debian:11

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies (protobuf from Debian 11 repos)
      run: |
        apt-get update -qq
        apt-get install -y -qq \
          build-essential \
          git \
          cmake \
          libprotobuf-dev \
          protobuf-compiler \
          zlib1g-dev \
          libssl-dev \
          pkg-config \
          libcurl4-openssl-dev

    - name: Verify protobuf version
      run: |
        protoc --version
        dpkg -l | grep protobuf || echo "No protobuf packages found"

    - name: Build projecthook
      run: |
        make clean || true
        make

    - name: List built .so files (debug)
      run: |
        find . -name "*.so" -type f -exec ls -l {} \; || true

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: libhook-proto-3.12.4
        path: |
          **/*.so
        if-no-files-found: error
